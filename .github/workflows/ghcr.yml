name: Publish Container to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image tag to publish, for example v3.0.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            if [ -z "$version" ]; then
              version="manual-${GITHUB_SHA::12}"
            fi
          fi
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker build \
            -t "$image:${{ steps.meta.outputs.version }}" \
            -t "$image:${{ steps.meta.outputs.sha_tag }}" \
            .

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker push "$image:${{ steps.meta.outputs.version }}"
          docker push "$image:${{ steps.meta.outputs.sha_tag }}"

      - name: Smoke published image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker pull "$image:${{ steps.meta.outputs.version }}"
          docker run --rm "$image:${{ steps.meta.outputs.version }}" --version
