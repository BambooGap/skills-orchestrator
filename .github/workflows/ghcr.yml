name: Publish Container to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image tag to publish, for example v3.0.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            if [ -z "$version" ]; then
              version="manual-${GITHUB_SHA::12}"
            fi
          fi
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push multi-arch image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$image:${{ steps.meta.outputs.version }}" \
            --tag "$image:${{ steps.meta.outputs.sha_tag }}" \
            --push \
            .

      - name: Smoke published image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker pull "$image:${{ steps.meta.outputs.version }}"
          docker run --rm "$image:${{ steps.meta.outputs.version }}" --version

      - name: Resolve published image digest
        id: image_digest
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          digest="$(
            docker buildx imagetools inspect "$image:${{ steps.meta.outputs.version }}" |
              awk '/^Digest:/ {print $2; exit}'
          )"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected image digest: $digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate container SBOM and provenance metadata
        shell: bash
        run: |
          set -euo pipefail
          pip install -c constraints.txt -e .
          skills-orchestrator supply-chain container-release \
            --image "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.version }}" \
            --digest "${{ steps.image_digest.outputs.digest }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --workflow-run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --sbom-output container-sbom.cdx.json \
            --provenance-output container-provenance.json \
            --force
          skills-orchestrator schema validate \
            --kind supply-chain-sbom \
            --input container-sbom.cdx.json
          skills-orchestrator schema validate \
            --kind container-provenance \
            --input container-provenance.json

      - name: Attest container build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.image_digest.outputs.digest }}
          push-to-registry: true

      - name: Attest container SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.image_digest.outputs.digest }}
          sbom-path: container-sbom.cdx.json
          push-to-registry: true
