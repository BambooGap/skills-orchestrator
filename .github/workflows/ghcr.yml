name: Publish Container to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image tag to publish, for example v3.0.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            if [ -z "$version" ]; then
              version="manual-${GITHUB_SHA::12}"
            fi
          fi
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push multi-arch image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$image:${{ steps.meta.outputs.version }}" \
            --tag "$image:${{ steps.meta.outputs.sha_tag }}" \
            --push \
            .

      - name: Smoke published image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          docker pull "$image:${{ steps.meta.outputs.version }}"
          docker run --rm "$image:${{ steps.meta.outputs.version }}" --version

      - name: Resolve published image digest
        id: image_digest
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          ref="$image:${{ steps.meta.outputs.version }}"
          digest=""
          inspect_output=""
          for attempt in {1..10}; do
            if inspect_output="$(docker buildx imagetools inspect "$ref" 2>&1)"; then
              digest="$(awk '/^Digest:/ {print $2; exit}' <<<"$inspect_output")"
              if [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                break
              fi
            fi
            echo "Digest for $ref is not ready yet (attempt $attempt/10)." >&2
            sleep 6
          done
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected image digest: $digest" >&2
            printf '%s\n' "$inspect_output" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Sign published image digest
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          digest="${{ steps.image_digest.outputs.digest }}"
          cosign sign --yes "$image@$digest"

      - name: Verify published image signature
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.image }}"
          digest="${{ steps.image_digest.outputs.digest }}"
          identity_regexp="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/ghcr\\.yml@refs/(tags|heads)/.+$"
          cosign verify \
            --certificate-identity-regexp "$identity_regexp" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$image@$digest"

      - name: Generate container SBOM and provenance metadata
        shell: bash
        run: |
          set -euo pipefail
          pip install -c constraints.txt -e .
          skills-orchestrator supply-chain container-release \
            --image "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.version }}" \
            --digest "${{ steps.image_digest.outputs.digest }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --commit "${GITHUB_SHA}" \
            --workflow-run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --sbom-output container-sbom.cdx.json \
            --provenance-output container-provenance.json \
            --force
          skills-orchestrator schema validate \
            --kind supply-chain-sbom \
            --input container-sbom.cdx.json
          skills-orchestrator schema validate \
            --kind container-provenance \
            --input container-provenance.json

      - name: Attest container build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.image_digest.outputs.digest }}
          push-to-registry: true

      - name: Attest container SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.image_digest.outputs.digest }}
          sbom-path: container-sbom.cdx.json
          push-to-registry: true
