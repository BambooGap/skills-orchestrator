name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -c constraints.txt -e ".[dev]"

      - name: Ruff lint
        run: ruff check skills_orchestrator/ tests/

      - name: Ruff format check
        run: ruff format --check skills_orchestrator/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -c constraints.txt -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate skills config
        run: skills-orchestrator validate --config config/skills.yaml

      - name: CLI smoke checks
        run: |
          skills-orchestrator --help
          skills-orchestrator init --help
          skills-orchestrator mcp-test --help
          skills-orchestrator manifest --config config/skills.yaml --format json | python -m json.tool >/dev/null
          skills-orchestrator manifest --config config/skills.yaml --format cyclonedx | python -m json.tool >/dev/null
          skills-orchestrator policy export --config config/skills.yaml --format opa-input | python -m json.tool >/dev/null
          skills-orchestrator policy export --config config/skills.yaml --format rego-test >/dev/null
          mkdir -p .skills-audit
          skills-orchestrator mcp-test prepare_context '{"task":"release evidence","include_content":false}' --audit-dir .skills-audit >/dev/null
          skills-orchestrator usage report --audit-dir .skills-audit --json | python -m json.tool >/dev/null
          skills-orchestrator --version

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run local action
        uses: ./
        with:
          config: config/skills.yaml
          format: text

      - name: Run local action with SARIF output
        uses: ./
        with:
          config: config/skills.yaml
          format: sarif

      - name: Validate SARIF file generation
        run: |
          skills-orchestrator check --config config/skills.yaml --format sarif > skills-orchestrator.sarif
          python -m json.tool skills-orchestrator.sarif >/dev/null

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check third-party action pinning
        run: python scripts/check_action_pins.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: docker build -t skills-orchestrator:ci .

      - name: Smoke test Docker image
        run: |
          docker run --rm skills-orchestrator:ci --version
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            skills-orchestrator:ci \
            manifest --config config/skills.yaml --format json \
            | python -m json.tool >/dev/null
