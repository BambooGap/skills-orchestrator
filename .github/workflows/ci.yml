name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -c constraints.txt -e ".[dev]"

      - name: Ruff lint
        run: ruff check skills_orchestrator/ tests/

      - name: Ruff format check
        run: ruff format --check skills_orchestrator/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -c constraints.txt -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate skills config
        run: skills-orchestrator validate --config config/skills.yaml

      - name: CLI smoke checks
        run: |
          skills-orchestrator --help
          skills-orchestrator init --help
          skills-orchestrator mcp-test --help
          skills-orchestrator manifest --config config/skills.yaml --format json | python -m json.tool >/dev/null
          skills-orchestrator manifest --config config/skills.yaml --format cyclonedx | python -m json.tool >/dev/null
          skills-orchestrator policy export --config config/skills.yaml --format opa-input | python -m json.tool >/dev/null
          skills-orchestrator policy export --config config/skills.yaml --format rego-test >/dev/null
          skills-orchestrator adapters inspect --format json | python -m json.tool >/dev/null
          skills-orchestrator adapters export mcp-client-config --config config/skills.yaml | python -m json.tool >/dev/null
          skills-orchestrator adapters export openai-agents-sdk --config config/skills.yaml > /tmp/openai_skillops_agent.py
          python -m py_compile /tmp/openai_skillops_agent.py
          skills-orchestrator supply-chain sbom --no-dependencies | python -m json.tool >/dev/null
          mkdir -p .skills-audit
          skills-orchestrator mcp-test prepare_context '{"task":"release evidence","include_content":false}' --audit-dir .skills-audit >/dev/null
          skills-orchestrator usage report --audit-dir .skills-audit --json | python -m json.tool >/dev/null
          skills-orchestrator schema validate --kind github-app-installation --input examples/commercial-handoff/installation.json
          skills-orchestrator schema validate --kind hosted-registry-ingest --input examples/commercial-handoff/registry-ingest.json
          skills-orchestrator schema validate --kind enterprise-dashboard-snapshot --input examples/commercial-handoff/dashboard-snapshot.json
          skills-orchestrator --version

      - name: SkillOps demo repo conformance smoke
        run: |
          mkdir -p /tmp/skillops-demo-evidence
          skills-orchestrator schema validate --kind config --input examples/demo-repo/config/skills.yaml
          skills-orchestrator check \
            --config examples/demo-repo/config/skills.yaml \
            --policy-pack builtin/team-standard \
            --fail-on warning
          skills-orchestrator check \
            --config examples/demo-repo/config/skills.yaml \
            --format sarif \
            > /tmp/skillops-demo-evidence/check.sarif
          skills-orchestrator registry build \
            --config-glob examples/demo-repo/config/skills.yaml \
            --output /tmp/skillops-demo-evidence/registry-before.json
          cp /tmp/skillops-demo-evidence/registry-before.json \
            /tmp/skillops-demo-evidence/registry-after.json
          skills-orchestrator registry diff \
            /tmp/skillops-demo-evidence/registry-before.json \
            /tmp/skillops-demo-evidence/registry-after.json \
            --format json \
            --output /tmp/skillops-demo-evidence/registry-diff.json
          skills-orchestrator registry diff \
            /tmp/skillops-demo-evidence/registry-before.json \
            /tmp/skillops-demo-evidence/registry-after.json \
            --format markdown \
            --output /tmp/skillops-demo-evidence/registry-diff.md
          skills-orchestrator registry comment-body \
            /tmp/skillops-demo-evidence/registry-diff.md \
            --output /tmp/skillops-demo-evidence/registry-diff-comment.md
          skills-orchestrator evidence export \
            --config examples/demo-repo/config/skills.yaml \
            --out /tmp/skillops-demo-evidence
          skills-orchestrator dashboard snapshot \
            --evidence-dir /tmp/skillops-demo-evidence \
            --repository BambooGap/skills-orchestrator \
            --ref "${GITHUB_REF:-refs/heads/main}" \
            --commit "${GITHUB_SHA:-local}" \
            --output /tmp/skillops-demo-evidence/dashboard-snapshot.json
          skills-orchestrator adapters inspect \
            --path examples/demo-repo \
            --format json \
            > /tmp/skillops-demo-evidence/adapter-inspect.json
          skills-orchestrator schema validate --kind registry --input /tmp/skillops-demo-evidence/registry-before.json
          skills-orchestrator schema validate --kind registry-diff --input /tmp/skillops-demo-evidence/registry-diff.json
          skills-orchestrator schema validate --kind evidence --input /tmp/skillops-demo-evidence/evidence-manifest.json
          skills-orchestrator schema validate --kind enterprise-dashboard-snapshot --input /tmp/skillops-demo-evidence/dashboard-snapshot.json
          skills-orchestrator schema validate --kind adapter-inspect --input /tmp/skillops-demo-evidence/adapter-inspect.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/skillops-demo-evidence/adapter-inspect.json").read_text())
          expected = {"agents-md", "claude-skills", "mcp-client-config", "openai-agents-sdk"}
          detected = {surface["id"] for surface in data["surfaces"] if surface["detected"]}
          missing = sorted(expected - detected)
          if missing:
              raise SystemExit(f"missing demo adapter surfaces: {missing}")
          PY

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Smoke packaged schema resources
        run: |
          python -m venv /tmp/skills-orchestrator-wheel-smoke
          /tmp/skills-orchestrator-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/skills-orchestrator-wheel-smoke/bin/skills-orchestrator schema list --format json | python -m json.tool >/dev/null
          /tmp/skills-orchestrator-wheel-smoke/bin/skills-orchestrator schema validate --kind config --input config/skills.yaml

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run local action
        uses: ./
        with:
          config: config/skills.yaml
          format: text

      - name: Run local action with SARIF output
        uses: ./
        with:
          config: config/skills.yaml
          format: sarif

      - name: Validate SARIF file generation
        run: |
          skills-orchestrator check --config config/skills.yaml --format sarif > skills-orchestrator.sarif
          python -m json.tool skills-orchestrator.sarif >/dev/null

      - name: Validate registry comment body generation
        run: |
          skills-orchestrator registry build --config-glob config/skills.yaml --output registry-base.json
          cp registry-base.json registry-head.json
          skills-orchestrator registry diff registry-base.json registry-head.json --format markdown --output registry-diff.md
          skills-orchestrator registry comment-body registry-diff.md --output registry-diff-comment.md
          grep -F "skills-orchestrator:registry-diff-comment:v1" registry-diff-comment.md

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Check third-party action pinning
        run: python scripts/check_action_pins.py

      - name: Install package for supply-chain evidence
        run: pip install -c constraints.txt -e .

      - name: Generate package SBOM
        run: |
          skills-orchestrator supply-chain sbom --output package-sbom.cdx.json
          python -m json.tool package-sbom.cdx.json >/dev/null

      - name: Run pip-audit
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit --strict --requirement constraints.txt

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: docker build -t skills-orchestrator:ci .

      - name: Smoke test Docker image
        run: |
          docker run --rm skills-orchestrator:ci --version
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            skills-orchestrator:ci \
            manifest --config config/skills.yaml --format json \
            | python -m json.tool >/dev/null
