name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skills-orchestrator
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing，不需要存 PYPI_TOKEN
      attestations: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install -c constraints.txt build twine

      - name: Verify release tag and changelog match package version
        run: |
          VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          test "$(git describe --exact-match --tags "$GITHUB_SHA")" = "${GITHUB_REF_NAME}"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          grep -F "## [${VERSION}]" CHANGELOG.md

      - name: Run tests before publish
        run: |
          pip install -c constraints.txt -e ".[dev]"
          pytest tests/ -v --tb=short

      - name: Build package
        run: PIP_CONSTRAINT=constraints.txt python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Verify dist artifact names
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          expected = {
              f"skills_orchestrator-{version}-py3-none-any.whl",
              f"skills_orchestrator-{version}.tar.gz",
          }
          actual = {path.name for path in Path("dist").iterdir()}
          missing = expected - actual
          if missing:
              raise SystemExit(f"missing expected dist artifacts: {sorted(missing)}")
          PY

      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
