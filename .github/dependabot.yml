version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: pydantic-core
    groups:
      python-runtime:
        patterns:
          - "*"
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
      include: scope
